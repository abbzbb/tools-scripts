# SubCacheFallback · 订阅缓存回退
# 必须用 raw 导入（不要用 github.com/blob 网页）
# https://raw.githubusercontent.com/abbzbb/tools-scripts/main/QuantumultX/Rewrite/SubCacheFallback.conf
#
# 实测：Loon/QX/Clash 的 User-Agent → 403 device_limit
#       Safari 浏览器 UA → 200 YAML
# 因此同时启用：请求改 UA + 响应缓存/回退
#
# 开启：MitM、重写、证书信任；更新订阅时流量需走 QX

hostname = star.wag1719.top

^https://star\.wag1719\.top/u/.+ url script-request-header https://raw.githubusercontent.com/abbzbb/tools-scripts/main/Scripts/SubCacheFallback/SubCacheFallback.js
^https://star\.wag1719\.top/u/.+ url script-response-body https://raw.githubusercontent.com/abbzbb/tools-scripts/main/Scripts/SubCacheFallback/SubCacheFallback.js
